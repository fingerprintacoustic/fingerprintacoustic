<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fingerprint Acoustic</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14151A;
    --text: #F2EFE9;
    --text-muted: #9A9CA8;
    --accent: #E8A33D;
    --border: #34374A;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--text); font-family:'Work Sans',sans-serif; }
  .wrap{
    min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:40px 20px; text-align:center;
  }
  h1{
    font-family:'Bebas Neue',sans-serif; font-size:clamp(40px,8vw,72px); letter-spacing:0.03em;
    margin:0 0 8px; text-transform:uppercase;
  }
  h1 span{ color:var(--accent); }
  p.tag{ color:var(--text-muted); margin:0 0 44px; font-size:16px; }
  .links{ display:flex; flex-direction:column; gap:14px; width:100%; max-width:360px; }
  .links a{
    display:block; padding:16px 20px; border:1px solid var(--border); border-radius:8px;
    color:var(--text); text-decoration:none; font-weight:600; font-size:15px;
    transition: border-color .15s, transform .15s;
  }
  .links a:hover{ border-color:var(--accent); transform: translateY(-2px); }
  .links a .desc{ display:block; font-weight:400; color:var(--text-muted); font-size:13px; margin-top:4px; }
  footer{ margin-top:50px; color:var(--text-muted); font-size:13px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Fingerprint <span>Acoustic</span></h1>
    <p class="tag">Music, tools, and projects.</p>
    <div class="links">
      <a href="https://music.fingerprintacoustic.com">
        Music
        <span class="desc">Listen on Spotify &amp; YouTube Music</span>
      </a>
      <a href="https://swiftdrop.fingerprintacoustic.com">
        SwiftDrop
        <span class="desc">Peer-to-peer file transfer</span>
      </a>
      <a href="https://spool.fingerprintacoustic.com">
        Spool
        <span class="desc">A marketplace for video &amp; audio creators</span>
      </a>
    </div>
    <footer>Fingerprint Acoustic</footer>
  </div>
</body>
</html>
